services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: notesapp_docker_pw
      POSTGRES_DB: notes_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      SECRET_KEY: change-this-secret-key
      JWT_SECRET_KEY: change-this-jwt-secret
      DATABASE_URL: postgresql://postgres:notesapp_docker_pw@db:5432/notes_app
      OPENAI_API_KEY: ""
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
