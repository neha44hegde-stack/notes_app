{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header">

<h3>Edit Note</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>

Title

</label>

<input
type="text"
class="form-control"
name="title"
value="{{ note.title }}"
required>

</div>

<div class="mb-3">

<label>

Description

</label>

<textarea
class="form-control"
name="description"
rows="6"
required>{{ note.description }}</textarea>

</div>

<button
class="btn btn-primary">

Update Note

</button>

<a
href="{{ url_for('notes.dashboard') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
