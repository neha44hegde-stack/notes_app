{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header">

<h3>Add New Note</h3>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">

Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Description

</label>

<div class="mb-2">
<button type="button" id="voice-btn" class="btn btn-outline-danger btn-sm">Start Voice Input</button>
<span id="voice-status" class="text-muted small ms-2"></span>
</div>

<div id="editor" style="height: 200px; background: white;"></div>
<textarea name="description" id="description-hidden" style="display:none;"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Category

</label>

<select name="category_id" class="form-select">
    <option value="">No category</option>
    {% for category in categories %}
    <option value="{{ category.id }}">{{ category.name }}</option>
    {% endfor %}
</select>

</div>

<div class="mb-3">

<label class="form-label">

Tags

</label>

<input
type="text"
name="tags"
class="form-control"
placeholder="e.g. work, urgent, ideas (comma-separated)">

<div class="form-text">Separate multiple tags with commas.</div>

</div>

<div class="mb-3">

<label class="form-label">

Attachments

</label>

<input
type="file"
name="attachments"
class="form-control"
multiple>

<div class="form-text">You can select multiple files. Max 10MB each.</div>

</div>

<button
type="submit"
class="btn btn-success"
onclick="document.getElementById('description-hidden').value = quill.root.innerHTML;">

Save Note

</button>

<a href="{{ url_for('notes.dashboard') }}" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
    var quill = new Quill('#editor', {
        theme: 'snow'
    });

    var voiceBtn = document.getElementById('voice-btn');
    var voiceStatus = document.getElementById('voice-status');
    var recognizing = false;
    var recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = function(event) {
            var transcript = '';
            for (var i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            var insertIndex = quill.getLength() - 1;
            if (insertIndex < 0) insertIndex = 0;
            quill.insertText(insertIndex, transcript + ' ', 'user');
        };

        recognition.onerror = function(event) {
            voiceStatus.textContent = 'Error: ' + event.error;
            recognizing = false;
            voiceBtn.textContent = 'Start Voice Input';
        };

        recognition.onend = function() {
            recognizing = false;
            voiceBtn.textContent = 'Start Voice Input';
            voiceStatus.textContent = '';
        };

        voiceBtn.addEventListener('click', function() {
            if (recognizing) {
                recognition.stop();
                recognizing = false;
                voiceBtn.textContent = 'Start Voice Input';
            } else {
                recognition.start();
                recognizing = true;
                voiceBtn.textContent = 'Stop Voice Input';
                voiceStatus.textContent = 'Listening...';
            }
        });
    } else {
        voiceBtn.disabled = true;
        voiceBtn.textContent = 'Voice input not supported in this browser';
    }
</script>

{% endblock %}
