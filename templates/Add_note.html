{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header">

<h3>Add New Note</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Description

</label>

<textarea
name="description"
class="form-control"
rows="6"
required></textarea>

</div>

<button
class="btn btn-success">

Save Note

</button>

<a
href="{{ url_for('notes.dashboard') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
