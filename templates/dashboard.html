{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h2>Welcome, {{ session["username"] }}</h2>
        <p class="text-muted">Manage your notes</p>
    </div>

    <a href="{{ url_for('notes.add_note') }}"
       class="btn btn-success">
        + Add Note
    </a>

</div>

<!-- View tabs: Active / Archived / Trash -->
<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link {% if view == 'active' %}active{% endif %}"
           href="{{ url_for('notes.dashboard', view='active') }}">
            Notes
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if view == 'archived' %}active{% endif %}"
           href="{{ url_for('notes.dashboard', view='archived') }}">
            Archived
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if view == 'trash' %}active{% endif %}"
           href="{{ url_for('notes.dashboard', view='trash') }}">
            Trash
        </a>
    </li>
</ul>

<!-- Search + filters -->
<form method="GET" action="{{ url_for('notes.dashboard') }}" class="row g-2 mb-4">
    <input type="hidden" name="view" value="{{ view }}">

    <div class="col-md-5">
        <input type="text" name="q" value="{{ query_text }}"
               class="form-control" placeholder="Search notes...">
    </div>

    <div class="col-md-3">
        <select name="category_id" class="form-select">
